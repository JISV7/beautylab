services:
  db:
    image: postgres:17
    container_name: beautylab-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-beautylab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beautylab-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/beautylab
      - APP_NAME=BeautyLab API
      - DEBUG=true
      - JWT_SECRET_KEY=SuperSecretKey123
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # Overriding the default command since we'll use entrypoint.sh in Dockerfile
    # or just specify it here if we want to bypass Dockerfile CMD
    command: /app/entrypoint.sh

volumes:
  postgres_data:
